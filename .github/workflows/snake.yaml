name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: tomchaccom
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%23FFFFFF&color_dots=%23000000,%23FFFFFF,%23FFFFFF,%23FFFFFF
            dist/github-contribution-grid-snake.gif?palette=github-light&color_snake=%23FFFFFF&color_dots=%23000000,%23FFFFFF,%23FFFFFF,%23FFFFFF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23FFFFFF&color_dots=%23000000,%23FFFFFF,%23FFFFFF,%23FFFFFF


      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
