name: generate animation
on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - master
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: tomchaccom
          outputs: |
            # 파일 하나에 모든 설정을 주입합니다.
            # 뱀 색상은 흰색(white), 배경 점들은 검은색/회색 계열로 설정
            dist/github-contribution-grid-snake.svg?color_snake=#ffffff&color_dots=#161b22,#30363d,#6e7681,#bc8cff,#e2c5ff
                        
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
